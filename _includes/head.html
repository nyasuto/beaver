<head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  
  <!-- Japanese Language Optimization -->
  <meta http-equiv="Content-Language" content="{{ site.lang | default: 'ja' }}">
  <meta name="language" content="{{ site.lang | default: 'ja' }}">
  
  <!-- Preload Japanese fonts for performance -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  
  <!-- SEO and social media tags -->
  {%- seo -%}
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  
  <!-- RSS Feed -->
  {%- if jekyll.environment == 'production' and site.feed and site.feed.path -%}
    {%- feed_meta -%}
  {%- endif -%}
  
  <!-- Performance optimizations -->
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#8B4513">
  
  <!-- Japanese accessibility standards (JIS X 8341) -->
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <!-- Structured data for Japanese content -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title | jsonify }}",
    "description": "{{ site.description | jsonify }}",
    "url": "{{ site.url | append: site.baseurl }}",
    "inLanguage": "{{ site.lang | default: 'ja' }}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author | default: site.github.owner_name }}"
    },
    "publisher": {
      "@type": "Organization", 
      "name": "{{ site.title | jsonify }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/assets/images/logo.png' | absolute_url }}"
      }
    }
  }
  </script>
  
</head>
