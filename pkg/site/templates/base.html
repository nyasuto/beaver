<!DOCTYPE html>
<html lang="{{ .Language }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>{{ .Title }}</title>
    <meta name="description" content="{{ .Description }}">
    <meta name="author" content="{{ .SiteTitle }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .BaseURL }}{{ .URL }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Description }}">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ .BaseURL }}{{ .URL }}">
    <meta property="twitter:title" content="{{ .Title }}">
    <meta property="twitter:description" content="{{ .Description }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Theme color -->
    <meta name="theme-color" content="{{ .Theme.PrimaryColor }}">
    
    <!-- Mobile optimizations -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- Structured data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": {{ .SiteTitle | printf "%q" }},
        "description": {{ .SiteDescription | printf "%q" }},
        "url": "{{ .BaseURL }}",
        "inLanguage": "{{ .Language }}"
    }
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1>{{ .SiteTitle }}</h1>
            <p>{{ .SiteDescription }}</p>
        </div>
    </header>
    
    <!-- Navigation -->
    {{ if .Navigation }}
    <nav class="nav">
        <div class="container">
            <ul>
                {{ range .Navigation }}
                <li><a href="{{ .URL }}">{{ if .Icon }}{{ .Icon }} {{ end }}{{ .Title }}</a></li>
                {{ end }}
            </ul>
        </div>
    </nav>
    {{ end }}
    
    <!-- Main Content -->
    <main class="main">
        <div class="container">
            {{ template "content" . }}
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; {{ formatDate .Date }} {{ .SiteTitle }}. Generated with 🦫 Beaver.</p>
            <p>最終更新: {{ formatDateTime .Date }}</p>
        </div>
    </footer>
    
    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
