# Sample deployment configuration for testing (Astro-based architecture)
github_pages:
  enabled: true
  branch: "gh-pages"
  build_dir: "_site"
  custom_domain: "docs.example.com"
  # Simplified configuration for HTML mode only
  site:
    title: "Test Documentation"
    description: "Sample documentation for testing (Astro-based)"
    theme: "beaver-default"
    navigation:
      - name: "Home"
        url: "/"
        icon: "🏠"
      - name: "Documentation"
        url: "/docs/"
        icon: "📚"
      - name: "API Reference"
        url: "/api/"
        icon: "🔧"
  search:
    enabled: true
    provider: "lunr"
  analytics:
    enabled: true
    google_analytics_id: "GA-TEST-123"
  optimization:
    minify_html: true
    compress_images: true
    generate_sitemap: true