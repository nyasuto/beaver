# Complex deployment configuration for testing edge cases (Astro-based)
github_pages:
  enabled: true
  branch: "custom-pages"
  build_dir: "public"
  custom_domain: "custom.example.org"
  # Simplified HTML-only configuration
  site:
    title: "Complex Documentation Site"
    description: "A comprehensive documentation site with Astro architecture"
    theme: "beaver-default"
    author:
      name: "Test Organization"
      email: "test@example.org"
    navigation:
      - name: "Home"
        url: "/"
        icon: "🏠"
      - name: "Documentation"
        url: "/docs/"
        icon: "📚"
        children:
          - name: "Getting Started"
            url: "/docs/getting-started/"
          - name: "Configuration"
            url: "/docs/configuration/"
      - name: "API Reference"
        url: "/api/"
        icon: "🔧"
      - name: "Tutorials"
        url: "/tutorials/"
        icon: "📖"
      - name: "Community"
        url: "/community/"
        icon: "👥"
        external: true
    features:
      pwa: true
      seo: true
      minify_html: true
      service_worker: true
  search:
    enabled: true
    provider: "algolia"
    algolia:
      application_id: "TEST_APP_ID"
      index_name: "docs"
      search_only_api_key: "TEST_SEARCH_KEY"
  analytics:
    enabled: true
    google_analytics_id: "GA-COMPLEX-456"
    gtag_id: "GT-COMPLEX-789"
  optimization:
    minify_html: true
    compress_images: true
    generate_sitemap: true
    compress_css: true
    compress_js: true