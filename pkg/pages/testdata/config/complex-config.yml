# Complex deployment configuration for testing edge cases
github_pages:
  enabled: true
  branch: "custom-pages"
  build_dir: "public"
  custom_domain: "custom.example.org"
  jekyll:
    theme: "just-the-docs"
    config:
      title: "Complex Documentation Site"
      description: "A comprehensive documentation site with many features"
      baseurl: "/complex"
      url: "https://custom.example.org"
      author:
        name: "Test Organization"
        email: "test@example.org"
      markdown: "kramdown"
      highlighter: "rouge"
      kramdown:
        input: "GFM"
        hard_wrap: false
        syntax_highlighter: "rouge"
    collections:
      docs:
        output: true
        permalink: "/:collection/:name/"
      api:
        output: true
        permalink: "/api/:name/"
      tutorials:
        output: true
        permalink: "/tutorials/:name/"
      guides:
        output: true
        permalink: "/guides/:name/"
    plugins:
      - "jekyll-feed"
      - "jekyll-sitemap"
      - "jekyll-seo-tag"
      - "jekyll-redirect-from"
      - "jekyll-github-metadata"
    navigation:
      - name: "Home"
        url: "/"
        icon: "🏠"
      - name: "Documentation"
        url: "/docs/"
        icon: "📚"
        children:
          - name: "Getting Started"
            url: "/docs/getting-started/"
          - name: "Configuration"
            url: "/docs/configuration/"
      - name: "API Reference"
        url: "/api/"
        icon: "🔧"
      - name: "Tutorials"
        url: "/tutorials/"
        icon: "📖"
      - name: "Community"
        url: "/community/"
        icon: "👥"
        external: true
  search:
    enabled: true
    provider: "algolia"
    algolia:
      application_id: "TEST_APP_ID"
      index_name: "docs"
      search_only_api_key: "TEST_SEARCH_KEY"
  analytics:
    enabled: true
    google_analytics_id: "GA-COMPLEX-456"
    gtag_id: "GT-COMPLEX-789"
  optimization:
    minify_html: true
    compress_images: true
    generate_sitemap: true
    compress_css: true
    compress_js: true

github_wiki:
  enabled: true
  branch: "wiki-content"
  clone_url_template: "https://github.com/{owner}/{repo}.wiki.git"
  content:
    source_dir: "wiki-src"
    exclude_patterns:
      - "_*"
      - ".git*"
      - "*.tmp"
      - "node_modules"
    file_naming:
      convert_spaces: true
      replacement_char: "-"
      preserve_case: false
  templates:
    home_page: "_layouts/wiki-home.html"
    sidebar: "_includes/wiki-sidebar.html"
  sync:
    bidirectional: true
    conflict_resolution: "manual"
    auto_commit: false