project:
  name: "Beaver - GitHub知識ベース構築ツール"
  repository: "nyasuto/beaver"

sources:
  github:
    issues: true
    commits: true
    prs: true
    # token will be provided via GITHUB_TOKEN environment variable

output:
  # GitHub Pages configuration - primary output target
  targets:
    - type: "github-pages"
      config:
        theme: "minima"
        branch: "gh-pages"
        enable_search: true
  github_pages:
    theme: "minima"
    enable_search: true
    branch: "gh-pages"

classification:
  # Rule-based classification settings
  min_confidence: 0.5
  enable_patterns: true
  custom_rules: []