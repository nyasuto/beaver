project:
  name: "Beaver - AIエージェント知識ダム構築ツール"
  repository: "nyasuto/beaver"

sources:
  github:
    issues: true
    commits: true
    prs: true
    # token will be provided via GITHUB_TOKEN environment variable

output:
  # GitHub Pages configuration - primary output target
  targets:
    - type: "github-pages"
      config:
        theme: "minima"
        branch: "gh-pages"
        enable_search: true
  github_pages:
    theme: "minima"
    enable_search: true
    branch: "gh-pages"

ai:
  provider: "openai"      # openai, anthropic, local
  model: "gpt-4"
  features:
    summarization: true   # 要約
    categorization: true  # 分類
    troubleshooting: true # トラブルシューティング