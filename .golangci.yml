# golangci-lint configuration for Beaver project
# https://golangci-lint.run/usage/configuration/
version: 2

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  # Exclude test files from certain linters
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unused