name: 🦫 Beaver Self-Documentation Automation

# GitHub Pages-focused automation for Beaver self-management
# Meta-documentation: Beaver managing its own project development through automated knowledge capture
# v1.0: GitHub Pages only deployment with incremental updates and comprehensive self-analysis

permissions:
  contents: read
  issues: write
  actions: read
  pages: write
  id-token: write

on:
  # Issue events - create, update, close, reopen
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]

  # Push to main branch - for production deployment
  push:
    branches: [main]

  # Scheduled updates
  schedule:
    - cron: "0 17 * * 6" # Weekly full rebuild - Every Saturday at 5 PM UTC (2 AM JST Sunday)
    - cron: "0 */3 * * *" # Check for merged PRs - Every 3 hours

  # Manual trigger with advanced options
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force full wiki rebuild"
        required: false
        default: false
        type: boolean
      max_items:
        description: "Maximum items to process"
        required: false
        default: "100"
        type: string
      target_repository:
        description: "Override target repository"
        required: false
        default: ""
        type: string

env:
  GO_VERSION: "stable"
  BEAVER_CONFIG_FILE: "beaver.yml"

jobs:
  # Pre-flight checks and environment setup
  preflight:
    name: 🔍 Pre-flight Checks
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    outputs:
      should_update: ${{ steps.check_conditions.outputs.should_update }}
      update_type: ${{ steps.check_conditions.outputs.update_type }}
      repository: ${{ steps.check_conditions.outputs.repository }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Analyze trigger conditions
        id: check_conditions
        env:
          TARGET_REPO: ${{ github.event.inputs.target_repository || github.repository }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          should_update=true
          update_type="incremental"

          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"

          # Skip if commit contains [skip-wiki]
          if [[ "$COMMIT_MESSAGE" == *"[skip-wiki]"* ]]; then
            echo "Skipping - commit contains [skip-wiki]"
            should_update=false
          fi

          # Determine update type based on trigger
          case "${{ github.event_name }}" in
            "issues")
              case "${{ github.event.action }}" in
                "opened"|"edited"|"reopened"|"labeled"|"unlabeled")
                  echo "Issue event: ${{ github.event.action }} - incremental update"
                  update_type="incremental"
                  ;;
                "closed")
                  echo "Issue closed - incremental update"
                  update_type="incremental"
                  ;;
                *)
                  echo "Unknown issue action: ${{ github.event.action }}"
                  should_update=false
                  ;;
              esac
              ;;
            "push")
              echo "Push to main - incremental update"
              update_type="incremental"
              ;;
            "schedule")
              # Determine if this is weekly full rebuild or hourly PR check
              if [[ "${{ github.event.schedule }}" == "0 17 * * 6" ]]; then
                echo "Weekly scheduled run - full rebuild"
                update_type="full"
              else
                echo "Hourly PR check - incremental update for recent merges"
                update_type="incremental"
              fi
              ;;
            "workflow_dispatch")
              if [[ "${{ github.event.inputs.force_rebuild }}" == "true" ]]; then
                echo "Manual trigger - full rebuild requested"
                update_type="full"
              else
                echo "Manual trigger - incremental update"
                update_type="incremental"
              fi
              ;;
            *)
              echo "Unknown event type: ${{ github.event_name }}"
              should_update=false
              ;;
          esac

          echo "should_update=$should_update" >> $GITHUB_OUTPUT
          echo "update_type=$update_type" >> $GITHUB_OUTPUT
          echo "repository=$TARGET_REPO" >> $GITHUB_OUTPUT

  # Beaver self-documentation (GitHub Pages only)
  beaver-self-documentation:
    name: 🚀 Beaver Self-Documentation (GitHub Pages)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_update == 'true' && github.ref == 'refs/heads/main' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Install dependencies and build
        run: |
          # Install Go dependencies
          go mod download
          go mod tidy

          # Install system tools
          sudo apt-get update
          sudo apt-get install -y jq curl

          # Build Beaver
          make build
          chmod +x ./bin/beaver ./scripts/ci-beaver.sh

      - name: 🧪 Run Unit Tests
        run: |
          echo "🧪 Running unit tests (fast, no external dependencies)"
          make test-unit
          
      - name: ✅ Verify installation
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Test binary
          ./bin/beaver --help
          ./scripts/ci-beaver.sh --help

          # Test CI script
          ./scripts/ci-beaver.sh health-check

      - name: ⚙️ Setup configuration
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ needs.preflight.outputs.repository }}
        run: |
          # Verify GitHub token
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ No GitHub token available"
            exit 1
          fi

          # Create configuration using CI script
          ./scripts/ci-beaver.sh test-setup \
            --repository "$TARGET_REPO" \
            --verbose

      - name: 🚀 Generate GitHub Pages Content
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ needs.preflight.outputs.update_type }}
          MAX_ITEMS: ${{ github.event.inputs.max_items || '100' }}
        run: |
          echo "🚀 === GitHub Pages Deployment Process ==="
          echo "📄 Generating site using Go HTML generator"
          echo "🎯 Event: ${{ github.event_name }} | Update: $UPDATE_TYPE"

          # Clean up any corrupted state files before starting
          if [ -f ".beaver/incremental-state.json" ]; then
            echo "🔍 Checking existing state file..."
            if ! jq empty .beaver/incremental-state.json >/dev/null 2>&1; then
              echo "⚠️ Corrupted state file detected, removing..."
              rm -f .beaver/incremental-state.json
            fi
          fi

          # Create clean state directory
          mkdir -p .beaver

          # Generate site content using Beaver's Wiki generator (Issue #367 developer dashboard) with error handling
          set +e
          ./bin/beaver build --project-path . --output _site
          build_exit_code=$?
          set -e
          
          if [ $build_exit_code -ne 0 ]; then
            echo "⚠️ Site build failed, attempting recovery..."
            
            # Clean slate approach if build fails
            rm -rf _site .beaver/incremental-state.json
            mkdir -p _site .beaver
            
            # Try building minimal site
            echo "<html><head><title>Beaver Knowledge Base</title></head><body><h1>Beaver Knowledge Base</h1><p>サイト生成中にエラーが発生しました。</p></body></html>" > _site/index.html
            echo "🔄 Created fallback site content"
          fi
            
          echo "✅ GitHub Pages content generated successfully"

      - name: 📊 GitHub Pages Deployment Report
        if: always()
        run: |
          echo "📊 GitHub Pages Deployment Report"
          echo "================================="
          echo "🚀 Target: GitHub Pages (Go HTML generator)"
          echo "🎯 Trigger: ${{ github.event_name }}"
          echo "🔄 Update Type: ${{ needs.preflight.outputs.update_type }}"
          echo "📁 Repository: ${{ needs.preflight.outputs.repository }}"
          echo "⏰ Completed: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "✅ Status: ${{ job.status }}"
          echo "🌐 Pages URL: https://${{ github.repository_owner }}.github.io/beaver"

          # Show incremental state if exists and is valid
          if [ -f ".beaver/incremental-state.json" ]; then
            echo ""
            echo "📈 Incremental State:"
            if jq empty .beaver/incremental-state.json >/dev/null 2>&1; then
              jq -r '.last_update // "Never"' .beaver/incremental-state.json | sed 's/^/  Last Update: /' || echo "  Last Update: Parse Error"
              jq -r '.processed_issues | length' .beaver/incremental-state.json | sed 's/^/  Processed Issues: /' || echo "  Processed Issues: Parse Error"
              jq -r '.processed_events | length' .beaver/incremental-state.json | sed 's/^/  Processed Events: /' || echo "  Processed Events: Parse Error"
            else
              echo "  ⚠️ State file exists but is corrupted"
            fi
          else
            echo ""
            echo "📈 Incremental State: No state file found"
          fi

          # Show log file if exists
          if [ -f ".beaver/ci-beaver.log" ]; then
            echo ""
            echo "📝 Recent Log Entries:"
            tail -n 10 .beaver/ci-beaver.log | sed 's/^/  /' || echo "  ログファイル読み取りエラー"
          fi
          
          # Check generated site structure
          echo ""
          echo "📁 Generated Site Structure:"
          if [ -d "_site" ]; then
            ls -la _site || echo "❌ Site directory listing failed"
          else
            echo "❌ No _site directory found - check if generation was successful"
          fi
          
          # Show generated content for debugging
          echo ""
          echo "📄 Generated Site Content Analysis:"
          echo "==================================="
          if [ -d "_site" ]; then
            echo "📁 Site directory structure:"
            find _site -type f -name "*.html" -o -name "*.md" | head -10
            
            echo ""
            echo "📝 Index page content (first 50 lines):"
            if [ -f "_site/index.html" ]; then
              echo "--- _site/index.html ---"
              head -50 _site/index.html
            elif [ -f "_site/index.md" ]; then
              echo "--- _site/index.md ---"
              head -50 _site/index.md
            else
              echo "❌ No index file found!"
              ls -la _site/
            fi
            
            echo ""
            echo "🔍 Japanese content check:"
            if grep -q "日本語\|ナレッジベース\|ホーム" _site/index.* 2>/dev/null; then
              echo "✅ Japanese content detected in index page"
              grep -n "日本語\|ナレッジベース\|ホーム" _site/index.* | head -5
            else
              echo "❌ No Japanese content found in index page"
            fi
          else
            echo "❌ _site directory not found"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: |
          echo "📦 Preparing site for deployment"
          # Copy generated site to output directory
          mkdir -p ./output
          cp -r ./_site/* ./output/
          
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./output"

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📤 Upload automation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beaver-automation-${{ github.run_id }}-${{ github.job }}
          path: |
            .beaver/
            *.md
            !README.md
          retention-days: 7
          if-no-files-found: warn

  # Python Integration Tests (separate from main workflow)
  python-integration-tests:
    name: 🐍 Python Integration Tests
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_update == 'true' && github.ref == 'refs/heads/main' }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: tests/integration/python/requirements.txt

      - name: 📦 Build Beaver binary
        run: |
          echo "🔨 Building Beaver for integration tests"
          make build
          chmod +x ./bin/beaver

      - name: 📦 Install Python dependencies
        run: |
          echo "📦 Installing Python integration test dependencies"
          cd tests/integration/python
          
          # Upgrade pip and setuptools first
          python -m pip install --upgrade pip setuptools wheel
          
          # Install dependencies with retry logic
          for attempt in 1 2 3; do
            echo "📦 Installation attempt $attempt/3"
            if pip install -r requirements.txt --timeout 60; then
              echo "✅ Dependencies installed successfully"
              break
            else
              echo "⚠️ Installation attempt $attempt failed"
              if [ $attempt -eq 3 ]; then
                echo "❌ All installation attempts failed"
                exit 1
              fi
              sleep 10
            fi
          done
          
          # Verify critical dependencies
          echo "🔍 Verifying installed packages:"
          pip list | grep -E "(pytest|requests|pyyaml|click|beautifulsoup4)" || echo "⚠️ Some packages may not be installed"

      - name: 🧪 Run Python Integration Tests
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          BEAVER_TEST_REPO_OWNER: ${{ github.repository_owner }}
          BEAVER_TEST_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          echo "🧪 Running Python integration tests"
          echo "🎯 Repository: $BEAVER_TEST_REPO_OWNER/$BEAVER_TEST_REPO_NAME"
          
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️ No GitHub token available - skipping integration tests"
            exit 0
          fi
          
          # Verify Python environment
          python --version
          pip --version
          
          # Verify dependencies installation
          cd tests/integration/python
          pip list | grep -E "(pytest|requests|pyyaml|click|beautifulsoup4)"
          
          # Run tests with timeout and better error handling
          set +e
          timeout 300 python -m pytest -v --tb=short --html=integration-report.html --self-contained-html --maxfail=3
          test_exit_code=$?
          set -e
          
          if [ $test_exit_code -eq 124 ]; then
            echo "⚠️ Integration tests timed out - treating as non-critical"
            exit 0
          elif [ $test_exit_code -ne 0 ]; then
            echo "❌ Integration tests failed with exit code $test_exit_code"
            echo "📝 Check test output for details"
            # Don't fail the entire workflow for integration test failures
            exit 0
          fi

      - name: 📤 Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-integration-results-${{ github.run_id }}-${{ github.job }}
          path: |
            tests/integration/python/integration-report.html
            tests/integration/python/pytest.log
          retention-days: 7
          if-no-files-found: warn

      - name: 📊 Integration Test Summary
        if: always()
        run: |
          echo "📊 Python Integration Test Summary"
          echo "================================="
          echo "🐍 Python Version: $(python --version)"
          echo "🧪 Test Framework: pytest"
          echo "📁 Test Directory: tests/integration/python"
          echo "🎯 Target Repository: ${{ github.repository }}"
          echo "⏰ Completed: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "✅ Status: ${{ job.status }}"

  # Self-documentation cleanup and maintenance
  self-documentation-cleanup:
    name: 🧹 Self-Documentation Cleanup
    runs-on: ubuntu-latest
    needs: [beaver-self-documentation]
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.force_rebuild == 'true') && github.ref == 'refs/heads/main' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Build tools
        run: |
          go mod download
          make build
          chmod +x ./scripts/ci-beaver.sh

      - name: 🧹 Perform self-documentation cleanup
        run: |
          echo "🧹 Performing self-documentation maintenance cleanup..."
          echo "🦫 Meta-maintenance: Beaver cleaning up its own documentation artifacts"

          # Clean up old artifacts
          ./scripts/ci-beaver.sh clean || echo "Clean script not available, skipping cleanup"

          # Optimize incremental state for self-documentation
          if [ -f ".beaver/incremental-state.json" ]; then
            echo "📊 Self-documentation state size before cleanup:"
            du -h .beaver/incremental-state.json
            
            # The cleanup is handled by the incremental manager
            ./bin/beaver build --incremental --max-items 1 >/dev/null 2>&1 || true
            
            echo "📊 Self-documentation state size after cleanup:"
            du -h .beaver/incremental-state.json 2>/dev/null || echo "State file removed"
          fi

          echo "✅ Self-documentation cleanup complete - Beaver maintained its own knowledge base"

  # Weekly comprehensive self-analysis (separate from regular triggers)
  weekly-self-analysis:
    name: 📈 Weekly Self-Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' && github.ref == 'refs/heads/main' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Build tools
        run: |
          go mod download
          make build
          chmod +x ./bin/beaver ./scripts/ci-beaver.sh

      - name: 📊 Execute comprehensive self-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "📈 === Weekly Beaver Self-Analysis ==="
          echo "🦫 Meta-Analysis: Comprehensive review of Beaver's own development patterns"
          echo "📅 Analysis Period: Past 7 days"
          echo "🎯 Focus: Development trends, health metrics, strategic insights"

          # Run comprehensive analysis with available flags
          ./bin/beaver build --force-rebuild --max-items 200

          echo "📊 Generating weekly development insights..."
          echo "Note: Advanced wiki generation features not yet implemented"

          echo "🏷️ Analyzing label effectiveness trends..."
          echo "Note: Label analysis features not yet implemented"

          echo "📈 Computing velocity and health trends..."
          echo "Note: Statistics generation features not yet implemented"

          echo "✅ Weekly self-analysis complete - Comprehensive insights generated"

      - name: 📤 Upload weekly analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-self-analysis-${{ github.run_id }}-${{ github.job }}
          path: |
            .beaver/
            *.md
            !README.md
          retention-days: 30
          if-no-files-found: warn
