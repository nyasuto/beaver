name: 🦫 Beaver GitHub Pages Deployment

# Simple GitHub Pages deployment for HTML-only site

permissions:
  contents: read
  pages: write
  id-token: write

on:
  # Push to main branch - for production deployment
  push:
    branches: [main]

  # Manual trigger
  workflow_dispatch:

env:
  GO_VERSION: "stable"

jobs:
  # Simple GitHub Pages deployment
  deploy-pages:
    name: 📄 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📁 Copy HTML files to _site
        run: |
          echo "📁 Preparing HTML files for GitHub Pages"
          mkdir -p _site
          
          # Copy HTML files
          for html_file in *.html; do
            if [ -f "$html_file" ]; then
              cp "$html_file" "_site/"
              echo "  ✅ Copied $html_file"
            fi
          done
          
          # Copy assets directory if it exists
          if [ -d "assets" ]; then
            cp -r assets "_site/"
            echo "  ✅ Copied assets directory"
          fi
          
          echo "✅ Site preparation complete"

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4