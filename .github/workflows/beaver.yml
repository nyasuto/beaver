name: 🦫 Beaver Self-Documentation Automation

# Enhanced GitHub Actions automation for Beaver self-management
# Meta-documentation: Beaver managing its own project development through automated knowledge capture
# Supports incremental updates, notifications, and comprehensive self-analysis

permissions:
  contents: read
  issues: write
  actions: read
  pages: write
  id-token: write

on:
  # Issue events - create, update, close, reopen
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  
  # Pull request events
  pull_request:
    types: [opened, closed, synchronize]
    branches: [main]
  
  # Push to main branch
  push:
    branches: [main]
  
  # Scheduled updates - weekly full rebuild
  schedule:
    - cron: '0 17 * * 6'  # Every Saturday at 5 PM UTC (2 AM JST Sunday)
  
  # Manual trigger with advanced options
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full wiki rebuild'
        required: false
        default: false
        type: boolean
      max_items:
        description: 'Maximum items to process'
        required: false
        default: '100'
        type: string
      target_repository:
        description: 'Override target repository'
        required: false
        default: ''
        type: string

env:
  GO_VERSION: 'stable'
  BEAVER_CONFIG_FILE: 'beaver.yml'

jobs:
  # Pre-flight checks and environment setup
  preflight:
    name: 🔍 Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check_conditions.outputs.should_update }}
      update_type: ${{ steps.check_conditions.outputs.update_type }}
      repository: ${{ steps.check_conditions.outputs.repository }}
      
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🔍 Analyze trigger conditions
      id: check_conditions
      env:
        TARGET_REPO: ${{ github.event.inputs.target_repository || github.repository }}
        COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
      run: |
        should_update=true
        update_type="incremental"
        
        echo "Event: ${{ github.event_name }}"
        echo "Action: ${{ github.event.action }}"
        
        # Skip if commit contains [skip-wiki]
        if [[ "$COMMIT_MESSAGE" == *"[skip-wiki]"* ]]; then
          echo "Skipping - commit contains [skip-wiki]"
          should_update=false
        fi
        
        # Determine update type based on trigger
        case "${{ github.event_name }}" in
          "issues")
            case "${{ github.event.action }}" in
              "opened"|"edited"|"reopened"|"labeled"|"unlabeled")
                echo "Issue event: ${{ github.event.action }} - incremental update"
                update_type="incremental"
                ;;
              "closed")
                echo "Issue closed - incremental update"
                update_type="incremental"
                ;;
              *)
                echo "Unknown issue action: ${{ github.event.action }}"
                should_update=false
                ;;
            esac
            ;;
          "pull_request")
            if [[ "${{ github.event.action }}" == "closed" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
              echo "PR merged - incremental update"
              update_type="incremental"
            else
              echo "PR event but not merged - skipping"
              should_update=false
            fi
            ;;
          "push")
            echo "Push to main - incremental update"
            update_type="incremental"
            ;;
          "schedule")
            echo "Scheduled run - full rebuild"
            update_type="full"
            ;;
          "workflow_dispatch")
            if [[ "${{ github.event.inputs.force_rebuild }}" == "true" ]]; then
              echo "Manual trigger - full rebuild requested"
              update_type="full"
            else
              echo "Manual trigger - incremental update"
              update_type="incremental"
            fi
            ;;
          *)
            echo "Unknown event type: ${{ github.event_name }}"
            should_update=false
            ;;
        esac
        
        echo "should_update=$should_update" >> $GITHUB_OUTPUT
        echo "update_type=$update_type" >> $GITHUB_OUTPUT
        echo "repository=$TARGET_REPO" >> $GITHUB_OUTPUT

  # Main Beaver self-documentation job
  beaver-self-documentation:
    name: 🦫 Beaver Self-Documentation
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_update == 'true' }}
    
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: 📦 Install dependencies and build
      run: |
        # Install Go dependencies
        go mod download
        go mod tidy
        
        # Install system tools
        sudo apt-get update
        sudo apt-get install -y jq curl
        
        # Build Beaver
        make build
        chmod +x ./bin/beaver ./scripts/ci-beaver.sh
        
    - name: ✅ Verify installation
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        # Test binary
        ./bin/beaver --help
        ./scripts/ci-beaver.sh --help
        
        # Test CI script
        ./scripts/ci-beaver.sh health-check
        
    - name: ⚙️ Setup configuration
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        TARGET_REPO: ${{ needs.preflight.outputs.repository }}
      run: |
        # Verify GitHub token
        if [ -z "$GITHUB_TOKEN" ]; then
          echo "❌ No GitHub token available"
          exit 1
        fi
        
        # Create configuration using CI script
        ./scripts/ci-beaver.sh test-setup \
          --repository "$TARGET_REPO" \
          --verbose
        
    - name: 🦫 Execute Beaver Self-Documentation
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        UPDATE_TYPE: ${{ needs.preflight.outputs.update_type }}
        MAX_ITEMS: ${{ github.event.inputs.max_items || '100' }}
      run: |
        echo "🦫 === Beaver Self-Documentation Process ==="
        echo "📊 Meta-Documentation: Beaver analyzing its own development"
        echo "🎯 Event: ${{ github.event_name }} | Update: $UPDATE_TYPE"
        
        # Determine command based on update type
        case "$UPDATE_TYPE" in
          "full")
            COMMAND="full-rebuild"
            echo "🔄 Executing full self-analysis and knowledge rebuild"
            ;;
          "incremental"|*)
            COMMAND="incremental"
            echo "⚡ Executing incremental self-documentation update"
            ;;
        esac
        
        # Execute self-documentation
        echo "🧠 Beaver is now analyzing and documenting its own development..."
        ./scripts/ci-beaver.sh "$COMMAND" \
          --repository "${{ needs.preflight.outputs.repository }}" \
          --max-items "$MAX_ITEMS" \
          --verbose
          
        echo "✅ Self-documentation complete - Beaver Wiki updated with latest insights"
        
    - name: 📊 Generate Self-Documentation Report
      if: always()
      run: |
        echo "📊 Beaver Self-Documentation Report"
        echo "====================================="
        echo "🦫 Meta-Analysis: Beaver documenting its own development"
        echo "🎯 Trigger: ${{ github.event_name }}"
        echo "🔄 Update Type: ${{ needs.preflight.outputs.update_type }}"
        echo "📁 Repository: ${{ needs.preflight.outputs.repository }}"
        echo "⏰ Completed: $(date '+%Y-%m-%d %H:%M:%S UTC')"
        echo "✅ Status: ${{ job.status }}"
        echo "🌐 Wiki: https://github.com/${{ needs.preflight.outputs.repository }}/wiki"
        
        # Show incremental state if exists
        if [ -f ".beaver/incremental-state.json" ]; then
          echo ""
          echo "📈 Incremental State:"
          jq -r '.last_update // "Never"' .beaver/incremental-state.json | sed 's/^/  Last Update: /'
          jq -r '.processed_issues | length' .beaver/incremental-state.json | sed 's/^/  Processed Issues: /'
          jq -r '.processed_events | length' .beaver/incremental-state.json | sed 's/^/  Processed Events: /'
        fi
        
        # Show log file if exists
        if [ -f ".beaver/ci-beaver.log" ]; then
          echo ""
          echo "📝 Recent Log Entries:"
          tail -n 10 .beaver/ci-beaver.log | sed 's/^/  /'
        fi

    - name: 📤 Deploy to GitHub Wiki
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        echo "📖 Deploying generated content to GitHub Wiki..."
        
        # Clone wiki repository
        wiki_url="https://x-access-token:$GITHUB_TOKEN@github.com/${{ needs.preflight.outputs.repository }}.wiki.git"
        
        if git clone "$wiki_url" wiki-repo 2>/dev/null; then
          echo "✅ Wiki repository cloned successfully"
        else
          echo "⚠️ Wiki not initialized - creating initial wiki structure"
          mkdir -p wiki-repo
          cd wiki-repo
          git init
          git remote add origin "$wiki_url"
          
          # Create initial Home page
          cat > Home.md << 'EOF'
        # Beaver Self-Documentation Wiki
        
        This wiki is automatically maintained by Beaver's self-documentation system.
        
        ## About This Wiki
        
        This wiki contains automatically generated documentation from:
        - GitHub Issues and their discussions
        - Project development insights
        - AI-enhanced analysis and patterns
        
        ## Last Updated
        
        This wiki was last updated automatically on $(date '+%Y-%m-%d %H:%M:%S UTC').
        
        ---
        *🦫 This wiki is maintained automatically by Beaver*
        EOF
          
          git add .
          git -c user.name="GitHub Actions" -c user.email="actions@github.com" commit -m "docs: initialize Beaver wiki [skip-wiki]"
          
          if git push -u origin master 2>/dev/null || git push -u origin main 2>/dev/null; then
            echo "✅ Wiki initialized successfully"
            cd ..
          else
            echo "❌ Failed to initialize wiki"
            cd ..
            exit 1
          fi
        fi
        
        # Copy generated markdown files to wiki
        cd wiki-repo
        
        # Update Home page with current project status
        cat > Home.md << EOF
        # ${{ needs.preflight.outputs.repository }} - Beaver Self-Documentation
        
        **Last Updated:** \$(date '+%Y-%m-%d %H:%M:%S UTC')  
        **Update Trigger:** ${{ github.event_name }}
        **Update Type:** ${{ needs.preflight.outputs.update_type }}
        
        ## 🦫 Beaver Self-Documentation System
        
        This wiki is automatically maintained by Beaver's self-documentation automation and contains:
        
        ### 📋 Generated Content
        - **Issue Analysis**: Automatically extracted from GitHub Issues
        - **Development Patterns**: AI-enhanced insights and learning paths
        - **Project Statistics**: Comprehensive metrics and trends
        - **Troubleshooting Guides**: Automated problem-solving documentation
        
        ### 🔄 Automation Details
        
        | Trigger | Description |
        |---------|-------------|
        | Issues Events | Wiki updated on issue changes (opened, closed, labeled) |
        | Pull Requests | Content refreshed on PR events |
        | Main Branch Push | Documentation updated on code changes |
        | Weekly Schedule | Comprehensive rebuild every Saturday |
        | Manual Trigger | On-demand updates with custom parameters |
        
        ### 🏷️ Recent Activity
        
        **Event:** \`${{ github.event_name }}\`
        **Update Type:** \`${{ needs.preflight.outputs.update_type }}\`
        
        \$( if [ "${{ github.event_name }}" = "issues" ]; then
          echo "**Issue #${{ github.event.issue.number }}** - Issue Updated"
        elif [ "${{ github.event_name }}" = "push" ]; then
          echo "**Latest Commit:** \`${{ github.sha }}\`"
          echo "**Message:** [Commit Message]"
        elif [ "${{ github.event_name }}" = "schedule" ]; then
          echo "**Scheduled Update:** Weekly comprehensive rebuild"
        elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "**Manual Update** triggered by: @${{ github.actor }}"
        fi )
        
        ---
        
        ## 📖 Navigation
        
        🏠 **[Home](./Home)**  
        📊 **[Statistics](./Statistics)** (if available)  
        🔍 **[Search Issues](https://github.com/${{ needs.preflight.outputs.repository }}/issues)**  
        🚀 **[Project Repository](https://github.com/${{ needs.preflight.outputs.repository }})**
        
        ---
        *🤖 This wiki is automatically maintained by Beaver Self-Documentation*
        EOF
        
        # Copy generated markdown files (remove repo prefix for wiki)
        for file in ../*.md; do
          if [ -f "$file" ]; then
            basename_file=$(basename "$file")
            # Remove repository prefix (e.g., "beaver-Home.md" -> "Home.md")
            wiki_filename="${basename_file#*-}"
            
            # Skip README.md
            if [ "$wiki_filename" != "README.md" ]; then
              cp "$file" "$wiki_filename"
              echo "📝 Copied $basename_file -> $wiki_filename"
            fi
          fi
        done
        
        # Configure git
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Add all changes
        git add .
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit to wiki"
        else
          # Commit changes
          commit_msg="docs: Beaver自動Wiki更新 - ${{ github.event_name }}"
          
          if [ "${{ github.event_name }}" = "issues" ]; then
            commit_msg="docs: Issue #${{ github.event.issue.number }} 対応のWiki更新 [skip-wiki]"
          elif [ "${{ github.event_name }}" = "push" ]; then
            commit_msg="docs: main push後のWiki更新 [skip-wiki]"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            commit_msg="docs: 定期Wiki更新 [skip-wiki]"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            commit_msg="docs: @${{ github.actor }}による手動Wiki更新 [skip-wiki]"
          fi
          
          git commit -m "$commit_msg"
          
          # Push changes
          if git push; then
            echo "✅ Wiki updated successfully"
            echo "🔗 View wiki: https://github.com/${{ needs.preflight.outputs.repository }}/wiki"
          else
            echo "❌ Failed to push wiki changes"
            exit 1
          fi
        fi

    - name: 📤 Upload automation artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: beaver-automation-${{ github.run_id }}
        path: |
          .beaver/
          *.md
          !README.md
        retention-days: 7

  # GitHub Pages deployment job
  deploy-github-pages:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [preflight, beaver-self-documentation]
    if: ${{ needs.preflight.outputs.should_update == 'true' && success() }}
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: 📦 Build Beaver
      run: |
        go mod download
        go mod tidy
        make build
        chmod +x ./bin/beaver ./scripts/ci-beaver.sh
        
    - name: ⚙️ Setup GitHub Pages configuration
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        TARGET_REPO: ${{ needs.preflight.outputs.repository }}
      run: |
        # Create enhanced configuration with GitHub Pages support
        ./scripts/ci-beaver.sh test-setup \
          --repository "$TARGET_REPO" \
          --enable-github-pages \
          --verbose
        
    - name: 🦫 Generate GitHub Pages content
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        UPDATE_TYPE: ${{ needs.preflight.outputs.update_type }}
        MAX_ITEMS: ${{ github.event.inputs.max_items || '100' }}
      run: |
        echo "🚀 === GitHub Pages Deployment Process ==="
        echo "📄 Generating Jekyll site for GitHub Pages"
        echo "🎯 Event: ${{ github.event_name }} | Update: $UPDATE_TYPE"
        
        # Generate GitHub Pages content
        ./scripts/ci-beaver.sh github-pages \
          --repository "${{ needs.preflight.outputs.repository }}" \
          --max-items "$MAX_ITEMS" \
          --theme "minima" \
          --enable-search \
          --verbose
          
        echo "✅ GitHub Pages content generated successfully"
        
    - name: 📄 Setup GitHub Pages
      uses: actions/configure-pages@v4
      
    - name: 📤 Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './_site'
        
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: 📊 GitHub Pages deployment report
      run: |
        echo "🚀 GitHub Pages Deployment Report"
        echo "=================================="
        echo "🦫 Meta-Documentation: Beaver Jekyll site deployed"
        echo "🌐 Pages URL: ${{ steps.deployment.outputs.page_url }}"
        echo "🎯 Trigger: ${{ github.event_name }}"
        echo "🔄 Update Type: ${{ needs.preflight.outputs.update_type }}"
        echo "📁 Repository: ${{ needs.preflight.outputs.repository }}"
        echo "⏰ Deployed: $(date '+%Y-%m-%d %H:%M:%S UTC')"
        echo "✅ Status: Success"

  # Self-documentation cleanup and maintenance
  self-documentation-cleanup:
    name: 🧹 Self-Documentation Cleanup
    runs-on: ubuntu-latest
    needs: [beaver-self-documentation]
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.force_rebuild == 'true') }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: 📦 Build tools
      run: |
        go mod download
        make build
        chmod +x ./scripts/ci-beaver.sh
        
    - name: 🧹 Perform self-documentation cleanup
      run: |
        echo "🧹 Performing self-documentation maintenance cleanup..."
        echo "🦫 Meta-maintenance: Beaver cleaning up its own documentation artifacts"
        
        # Clean up old artifacts
        ./scripts/ci-beaver.sh clean --verbose
        
        # Optimize incremental state for self-documentation
        if [ -f ".beaver/incremental-state.json" ]; then
          echo "📊 Self-documentation state size before cleanup:"
          du -h .beaver/incremental-state.json
          
          # The cleanup is handled by the incremental manager
          ./bin/beaver build --incremental --max-items 1 --dry-run >/dev/null 2>&1 || true
          
          echo "📊 Self-documentation state size after cleanup:"
          du -h .beaver/incremental-state.json 2>/dev/null || echo "State file removed"
        fi
        
        echo "✅ Self-documentation cleanup complete - Beaver maintained its own knowledge base"

  # Weekly comprehensive self-analysis (separate from regular triggers)
  weekly-self-analysis:
    name: 📈 Weekly Self-Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: 📦 Build tools
      run: |
        go mod download
        make build
        chmod +x ./bin/beaver ./scripts/ci-beaver.sh
        
    - name: 📊 Execute comprehensive self-analysis
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        echo "📈 === Weekly Beaver Self-Analysis ==="
        echo "🦫 Meta-Analysis: Comprehensive review of Beaver's own development patterns"
        echo "📅 Analysis Period: Past 7 days"
        echo "🎯 Focus: Development trends, health metrics, strategic insights"
        
        # Run comprehensive analysis with extended metrics
        ./bin/beaver build --comprehensive-analysis --week-range=7 --verbose
        
        echo "📊 Generating weekly development insights..."
        ./bin/beaver wiki generate development-strategy --force-refresh
        
        echo "🏷️ Analyzing label effectiveness trends..."
        ./bin/beaver wiki generate label-analysis --trend-analysis
        
        echo "📈 Computing velocity and health trends..."
        ./bin/beaver wiki generate statistics --include-trends
        
        echo "✅ Weekly self-analysis complete - Comprehensive insights generated"
        
    - name: 📤 Upload weekly analysis artifacts
      uses: actions/upload-artifact@v4
      with:
        name: weekly-self-analysis-${{ github.run_id }}
        path: |
          .beaver/
          *.md
          !README.md
        retention-days: 30

