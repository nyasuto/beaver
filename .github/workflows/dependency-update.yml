name: 📦 依存関係の更新

on:
  schedule:
    # 毎週月曜日の朝9時(JST)に実行
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: 🔄 Go依存関係の更新
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 コードのチェックアウト
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🐹 Go環境のセットアップ
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'
        cache: true
        
    - name: 📦 依存関係の更新チェック
      run: |
        echo "📋 現在の依存関係:"
        go list -m all
        echo ""
        echo "🔍 更新可能な依存関係をチェック中..."
        go get -u ./...
        go mod tidy
        
    - name: 🧪 更新後のテスト実行
      run: |
        echo "🧪 依存関係更新後のテスト実行..."
        go test ./...
        
    - name: 🔨 ビルドテスト
      run: |
        echo "🔨 依存関係更新後のビルドテスト..."
        make build
        
    - name: 📝 変更内容の確認
      id: changes
      run: |
        if git diff --quiet go.mod go.sum; then
          echo "変更なし"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "依存関係に変更あり"
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "📋 変更されたファイル:"
          git diff --name-only
          echo ""
          echo "📄 go.modの変更内容:"
          git diff go.mod || true
        fi
        
    - name: 🔧 Pull Requestの作成
      if: steps.changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: |
          deps: Go依存関係の自動更新
          
          定期的な依存関係更新により、セキュリティパッチと
          機能改善を適用。自動テストとビルドチェック済み。
          
          🤖 Generated with [Claude Code](https://claude.ai/code)
          
          Co-Authored-By: Claude <noreply@anthropic.com>
        title: 'deps: Go依存関係の自動更新'
        body: |
          ## 概要
          定期的なGo依存関係の自動更新です。
          
          ## 変更内容
          - Go依存関係を最新バージョンに更新
          - セキュリティパッチの適用
          - パフォーマンス改善の取り込み
          
          ## テスト
          - ✅ 自動テスト: 実行済み
          - ✅ ビルドテスト: 実行済み
          - ✅ 依存関係整合性: 確認済み
          
          ## 注意事項
          - 破壊的変更がないか確認してください
          - 必要に応じて追加テストを実行してください
          
          🤖 This PR was created automatically by GitHub Actions.
        branch: deps/auto-update-dependencies
        delete-branch: true
        
    - name: 📊 更新結果のサマリー
      run: |
        if [ "${{ steps.changes.outputs.changes }}" = "true" ]; then
          echo "✅ 依存関係が更新され、Pull Requestが作成されました"
        else
          echo "ℹ️ 依存関係に更新はありませんでした"
        fi