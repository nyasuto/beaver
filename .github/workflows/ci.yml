name: 🔄 Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: 'stable'

jobs:
  # Fast checks that run on every push/PR
  quality-checks:
    name: 🔍 Quality & Security
    runs-on: ubuntu-latest
    outputs:
      coverage-file: ${{ steps.coverage.outputs.file }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: 📦 Download dependencies
      run: go mod download
        
    - name: 📝 Format check
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "❌ Unformatted files: $unformatted"
          exit 1
        fi
        
    - name: 🔍 Lint check
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
        args: --timeout=5m
        
    - name: 🔒 Security scan
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec ./...
        
    - name: 🛡️ Vulnerability check
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
        
    - name: 🧪 Unit tests
      run: go test -v -race -coverprofile=coverage.out ./...
      
    - name: 📊 Upload coverage
      id: coverage
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  # Build verification (runs in parallel with quality-checks)
  build-test:
    name: 🔨 Build Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: 📦 Download dependencies
      run: go mod download
      
    - name: 🔨 Build
      run: make build
      
    - name: 🧪 Binary test
      run: ./bin/beaver --help
      
    - name: 📤 Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: beaver-binary
        path: bin/beaver
        retention-days: 7


  # Integration tests (conditional)
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-integration-tests'))
    
    environment: integration-testing
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: 📦 Download dependencies
      run: go mod download
      
    - name: 🔨 Build
      run: make build
      
    - name: 🧪 Setup integration environment
      run: |
        chmod +x ./scripts/run-integration-tests.sh
        
    - name: 🔗 Run integration tests
      env:
        BEAVER_INTEGRATION_TESTS: true
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
        BEAVER_TEST_REPO_OWNER: ${{ vars.BEAVER_TEST_REPO_OWNER }}
        BEAVER_TEST_REPO_NAME: ${{ vars.BEAVER_TEST_REPO_NAME }}
        BEAVER_DEBUG: true
      run: |
        echo "🧪 Running integration tests..."
        ./scripts/run-integration-tests.sh --check
        ./scripts/run-integration-tests.sh --quick --run
      timeout-minutes: 15
      
    - name: 📤 Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: |
          *.log
          .env.integration
        retention-days: 7

  # Performance tests (main branch only)
  performance-tests:
    name: 🚀 Performance Tests
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment: integration-testing
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: 📦 Download dependencies
      run: go mod download
      
    - name: 🚀 Run performance tests
      env:
        BEAVER_INTEGRATION_TESTS: true
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
        BEAVER_TEST_REPO_OWNER: ${{ vars.BEAVER_TEST_REPO_OWNER }}
        BEAVER_TEST_REPO_NAME: ${{ vars.BEAVER_TEST_REPO_NAME }}
      run: |
        echo "🚀 Running performance tests..."
        chmod +x ./scripts/run-integration-tests.sh
        ./scripts/run-integration-tests.sh --all --run
      timeout-minutes: 30
      
    - name: 📤 Upload performance results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-test-results
        path: |
          *.log
          performance-*.json
        retention-days: 30

  # Final status
  ci-complete:
    name: ✅ CI Complete
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test, integration-tests, performance-tests]
    if: always()
    
    steps:
    - name: 📊 Report status
      run: |
        echo "📊 CI Pipeline Results:"
        echo "🔍 Quality & Security: ${{ needs.quality-checks.result }}"
        echo "🔨 Build Test: ${{ needs.build-test.result }}"
        echo "🔗 Integration Tests: ${{ needs.integration-tests.result }}"
        echo "🚀 Performance Tests: ${{ needs.performance-tests.result }}"
        
        if [[ "${{ needs.quality-checks.result }}" == "failure" || "${{ needs.build-test.result }}" == "failure" ]]; then
          echo "❌ Critical checks failed!"
          exit 1
        fi
        
        echo "✅ All critical checks passed!"