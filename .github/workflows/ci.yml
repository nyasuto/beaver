name: 🔄 Continuous Integration

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "stable"

jobs:
  # Fast checks that run on every push/PR
  quality-checks:
    name: 🔍 Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            go.mod

      - name: 📝 Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ Unformatted files: $unformatted"
            exit 1
          fi

      - name: 🔍 Lint & Security check
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m --verbose

      - name: 🛡️ Vulnerability check
        id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}

      - name: 🧪 Unit tests
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: 📊 Upload coverage
        id: coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Build verification (runs in parallel with quality-checks)
  build-test:
    name: 🔨 Build Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦫 Setup Beaver Environment
        uses: ./.github/actions/build-and-test
        with:
          go-version: ${{ env.GO_VERSION }}
          run-tests: false

      - name: 🧪 Binary test
        run: ./bin/beaver --help

      - name: 📤 Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: beaver-binary-${{ github.run_id }}
          path: bin/beaver
          retention-days: 7

  # Final status (no longer waits for integration tests)
  ci-complete:
    name: ✅ CI Complete
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test]
    if: always()

    steps:
      - name: 📊 Report status
        run: |
          echo "📊 CI Pipeline Results:"
          echo "🔍 Quality & Security: ${{ needs.quality-checks.result }}"
          echo "🔨 Build Test: ${{ needs.build-test.result }}"

          if [[ "${{ needs.quality-checks.result }}" == "failure" || "${{ needs.build-test.result }}" == "failure" ]]; then
            echo "❌ Critical checks failed!"
            exit 1
          fi

          echo "✅ All critical checks passed!"
          echo "ℹ️ Integration tests run separately in the Integration workflow"

      - name: 📝 CI Summary
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality & Security | ${{ needs.quality-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Test | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ Integration tests are run separately in the [Integration workflow](.github/workflows/integration.yml)"
