name: 🔄 Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: 'stable'

jobs:
  # Fast checks that run on every push/PR
  quality-checks:
    name: 🔍 Quality & Security
    runs-on: ubuntu-latest
    outputs:
      coverage-file: ${{ steps.coverage.outputs.file }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: 📦 Download dependencies
      run: go mod download
        
    - name: 📝 Format check
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "❌ Unformatted files: $unformatted"
          exit 1
        fi
        
    - name: 🔍 Lint check
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
        args: --timeout=5m
        
    - name: 🔒 Security scan
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec ./...
        
    - name: 🛡️ Vulnerability check
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
        
    - name: 🧪 Unit tests
      run: go test -v -race -coverprofile=coverage.out ./...
      
    - name: 📊 Upload coverage
      id: coverage
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  # Build verification
  build-test:
    name: 🔨 Build Test
    runs-on: ubuntu-latest
    needs: quality-checks
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: 📦 Download dependencies
      run: go mod download
      
    - name: 🔨 Build
      run: make build
      
    - name: 🧪 Binary test
      run: ./bin/beaver --help
      
    - name: 📤 Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: beaver-binary
        path: bin/beaver
        retention-days: 7


  # Final status
  ci-complete:
    name: ✅ CI Complete
    runs-on: ubuntu-latest
    needs: [quality-checks, build-test]
    if: always()
    
    steps:
    - name: 📊 Report status
      run: |
        echo "📊 CI Pipeline Results:"
        echo "🔍 Quality & Security: ${{ needs.quality-checks.result }}"
        echo "🔨 Build Test: ${{ needs.build-test.result }}"
        
        if [[ "${{ needs.quality-checks.result }}" == "failure" || "${{ needs.build-test.result }}" == "failure" ]]; then
          echo "❌ Critical checks failed!"
          exit 1
        fi
        
        echo "✅ All critical checks passed!"