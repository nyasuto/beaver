name: Coverage Dashboard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  coverage-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: go mod download

    - name: Run tests with coverage
      run: go test -v -coverprofile=coverage.out ./...

    - name: Install Beaver
      run: go install ./cmd/beaver

    - name: Generate coverage dashboard
      run: |
        # Check if coverage.out exists
        if [ ! -f "coverage.out" ]; then
          echo "::error::Coverage file not found"
          exit 1
        fi
        
        # Generate interactive HTML dashboard
        beaver coverage report --input coverage.out --format html --output coverage-dashboard.html
        
        # Export for GitHub Pages
        beaver coverage export --input coverage.out --format github-pages --output coverage-data.json
        
        # Export CI summary  
        beaver coverage export --input coverage.out --format ci-summary --output coverage-summary.json

    - name: Check coverage threshold
      run: |
        # Check coverage and show warnings but don't fail the build
        beaver coverage validate --min-coverage 70 || echo "::warning::Coverage below 70% threshold"
        
        # Display summary (check if file exists first)
        if [ -f "coverage-summary.json" ]; then
          echo "::notice::Coverage data exported successfully"
        fi

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          coverage-dashboard.html
          coverage-data.json
          coverage-summary.json
          coverage.out

    - name: Deploy to GitHub Pages (main branch only)
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        keep_files: true
        destination_dir: coverage
        publish_branch: gh-pages
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy coverage dashboard'

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request' && hashFiles('coverage-summary.json') != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const summary = JSON.parse(fs.readFileSync('coverage-summary.json', 'utf8'));
            
            const coverageComment = `
            ## 📊 Coverage Report
            
            **Overall Coverage:** ${summary.total_coverage ? summary.total_coverage.toFixed(1) : 'N/A'}%
            **Status:** ✅ Coverage dashboard generated
            
            📈 Coverage analysis completed successfully.
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: coverageComment
            });
          } catch (error) {
            console.log('Coverage summary file not found or invalid, skipping PR comment.');
          }

  codecov-integration:
    runs-on: ubuntu-latest
    if: false  # Enable if using Codecov
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run tests with coverage
      run: go test -v -coverprofile=coverage.out ./...

    - name: Upload to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true