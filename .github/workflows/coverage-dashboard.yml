name: Coverage Dashboard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  coverage-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: go mod download

    - name: Run tests with coverage
      run: go test -v -coverprofile=coverage.out ./...

    - name: Install Beaver
      run: go install ./cmd/beaver

    - name: Generate coverage dashboard
      run: |
        # Generate interactive HTML dashboard
        beaver coverage --html --output coverage-dashboard.html
        
        # Export for GitHub Pages
        beaver coverage export --format github-pages --output coverage-data.json
        
        # Export CI summary
        beaver coverage export --format ci-summary --output coverage-summary.json

    - name: Check coverage threshold
      run: |
        # Check if coverage meets minimum threshold
        if ! beaver coverage validate --min-coverage 70 --fail-on-low; then
          echo "::error::Coverage below threshold"
          exit 1
        fi
        
        # Display summary
        echo "::notice::$(jq -r '"Coverage: " + (.total_coverage|tostring) + "% (" + .quality_grade + ")"' coverage-summary.json)"

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v3
      with:
        name: coverage-reports
        path: |
          coverage-dashboard.html
          coverage-data.json
          coverage-summary.json
          coverage.out

    - name: Deploy to GitHub Pages (main branch only)
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        keep_files: true
        destination_dir: coverage
        publish_branch: gh-pages
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy coverage dashboard'

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('coverage-summary.json', 'utf8'));
          
          const coverageComment = `
          ## 📊 Coverage Report
          
          **Overall Coverage:** ${summary.total_coverage.toFixed(1)}% (${summary.quality_grade})
          **Status:** ${summary.passed_threshold ? '✅ Passed' : '❌ Failed'} threshold
          
          ### Package Summary
          - **Total Packages:** ${summary.packages_summary.total}
          - **Tested Packages:** ${summary.packages_summary.tested}
          - **Grade Distribution:** A:${summary.packages_summary.grade_a} B:${summary.packages_summary.grade_b} C:${summary.packages_summary.grade_c} D:${summary.packages_summary.grade_d} F:${summary.packages_summary.grade_f}
          
          ${summary.critical_issues > 0 ? `### ⚠️ Critical Issues: ${summary.critical_issues}` : ''}
          ${summary.top_issues.length > 0 ? `### Top Issues:\n${summary.top_issues.map(issue => `- ${issue}`).join('\n')}` : ''}
          
          📈 [View detailed dashboard](https://your-org.github.io/your-repo/coverage/coverage-dashboard.html)
          `;
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: coverageComment
          });

  codecov-integration:
    runs-on: ubuntu-latest
    if: false  # Enable if using Codecov
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run tests with coverage
      run: go test -v -coverprofile=coverage.out ./...

    - name: Upload to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true