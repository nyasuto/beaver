name: 📚 Documentation Deployment

# GitHub Pages deployment automation for Beaver documentation
# Automated generation and deployment of project knowledge base
# Converts GitHub Issues into structured, searchable documentation

permissions:
  contents: read
  issues: write
  actions: read
  pages: write
  id-token: write

# Ensure only one self-documentation workflow runs at a time to prevent conflicts
# When issues are updated rapidly, multiple workflows could run in parallel
# This would cause:
# - Git conflicts when pushing to GitHub Pages
# - Resource contention during site generation
# - Inconsistent incremental state management
# Solution: Serialize execution with cancel-in-progress: false to queue subsequent runs
concurrency:
  group: beaver-self-documentation
  cancel-in-progress: false

on:
  # Issue events - create, update, close, reopen
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]

  # Push to main branch - for production deployment
  push:
    branches: [main]

  # Scheduled updates
  schedule:
    - cron: "0 17 * * 6" # Weekly full rebuild - Every Saturday at 5 PM UTC (2 AM JST Sunday)
    - cron: "0 */3 * * *" # Check for merged PRs - Every 3 hours

  # Manual trigger with advanced options
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force full wiki rebuild"
        required: false
        default: false
        type: boolean
      max_items:
        description: "Maximum items to process"
        required: false
        default: "100"
        type: string
      target_repository:
        description: "Override target repository"
        required: false
        default: ""
        type: string

env:
  GO_VERSION: "stable"
  BEAVER_CONFIG_FILE: "beaver.yml"

jobs:
  # Pre-flight checks and environment setup
  preflight:
    name: 🔍 Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check_conditions.outputs.should_update }}
      update_type: ${{ steps.check_conditions.outputs.update_type }}
      repository: ${{ steps.check_conditions.outputs.repository }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Analyze trigger conditions
        id: check_conditions
        env:
          TARGET_REPO: ${{ github.event.inputs.target_repository || github.repository }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          should_update=true
          update_type="incremental"

          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"

          # Skip if commit contains [skip-wiki]
          if [[ "$COMMIT_MESSAGE" == *"[skip-wiki]"* ]]; then
            echo "Skipping - commit contains [skip-wiki]"
            should_update=false
          fi

          # Determine update type based on trigger
          case "${{ github.event_name }}" in
            "issues")
              case "${{ github.event.action }}" in
                "opened"|"edited"|"reopened"|"labeled"|"unlabeled")
                  echo "Issue event: ${{ github.event.action }} - incremental update"
                  update_type="incremental"
                  ;;
                "closed")
                  echo "Issue closed - incremental update"
                  update_type="incremental"
                  ;;
                *)
                  echo "Unknown issue action: ${{ github.event.action }}"
                  should_update=false
                  ;;
              esac
              ;;
            "push")
              echo "Push to main - incremental update"
              update_type="incremental"
              ;;
            "schedule")
              # Determine if this is weekly full rebuild or hourly PR check
              if [[ "${{ github.event.schedule }}" == "0 17 * * 6" ]]; then
                echo "Weekly scheduled run - full rebuild"
                update_type="full"
              else
                echo "Hourly PR check - incremental update for recent merges"
                update_type="incremental"
              fi
              ;;
            "workflow_dispatch")
              if [[ "${{ github.event.inputs.force_rebuild }}" == "true" ]]; then
                echo "Manual trigger - full rebuild requested"
                update_type="full"
              else
                echo "Manual trigger - incremental update"
                update_type="incremental"
              fi
              ;;
            *)
              echo "Unknown event type: ${{ github.event_name }}"
              should_update=false
              ;;
          esac

          echo "should_update=$should_update" >> $GITHUB_OUTPUT
          echo "update_type=$update_type" >> $GITHUB_OUTPUT
          echo "repository=$TARGET_REPO" >> $GITHUB_OUTPUT

  # Beaver self-documentation (GitHub Pages only)
  beaver-self-documentation:
    name: 🚀 Beaver Self-Documentation (GitHub Pages)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_update == 'true' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Install dependencies and build
        run: |
          # Install Go dependencies
          go mod download
          go mod tidy

          # Install system tools
          sudo apt-get update
          sudo apt-get install -y jq curl

          # Build Beaver
          make build
          chmod +x ./bin/beaver ./scripts/core/ci-beaver.sh

      - name: 🧪 Run Unit Tests
        run: |
          echo "🧪 Running unit tests (fast, no external dependencies)"
          make test-unit

      - name: 📊 Generate Coverage Data
        run: |
          echo "📊 Generating coverage data for dashboard..."
          # Run tests with coverage profile
          go test -v -coverprofile=coverage.out ./...
          
          # Install beaver for coverage analysis
          go install ./cmd/beaver
          
          # Generate coverage dashboard files
          if [ -f "coverage.out" ]; then
            echo "✅ Coverage data generated"
            
            # Generate interactive HTML dashboard
            beaver coverage report --input coverage.out --format html --output coverage-dashboard.html
            
            # Export for GitHub Pages integration
            beaver coverage export --input coverage.out --format github-pages --output coverage-data.json
            
            # Export CI summary for validation
            beaver coverage export --input coverage.out --format ci-summary --output coverage-summary.json
            
            echo "📊 Coverage dashboard files generated successfully"
          else
            echo "⚠️ No coverage data found, skipping coverage dashboard generation"
          fi

      - name: 📊 Coverage Quality Check
        if: hashFiles('coverage-summary.json') != ''
        run: |
          echo "📊 Checking coverage quality..."
          # Show coverage summary but don't fail build
          beaver coverage validate --min-coverage 70 --fail-on-low=false || echo "::warning::Coverage below 70% threshold"
          
          # Display coverage summary
          if [ -f "coverage-summary.json" ]; then
            echo "::notice::Coverage analysis completed - dashboard will be deployed"
          fi
          
      - name: ✅ Verify installation
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Test binary
          ./bin/beaver --help
          ./scripts/core/ci-beaver.sh --help

          # Test CI script
          ./scripts/core/ci-beaver.sh health-check

      - name: ⚙️ Setup configuration
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ needs.preflight.outputs.repository }}
        run: |
          # Verify GitHub token
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ No GitHub token available"
            exit 1
          fi

          # Create configuration using CI script
          ./scripts/core/ci-beaver.sh test-setup \
            --repository "$TARGET_REPO" \
            --verbose

      - name: 🚀 Generate GitHub Pages Content (Astro)
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ needs.preflight.outputs.update_type }}
          MAX_ITEMS: ${{ github.event.inputs.max_items || '100' }}
        run: |
          echo "🚀 === GitHub Pages Deployment Process ==="
          echo "🎨 Generating site using Astro Frontend"
          echo "🎯 Event: ${{ github.event_name }} | Update: $UPDATE_TYPE"

          # Clean up any corrupted state files before starting
          if [ -f ".beaver/incremental-state.json" ]; then
            echo "🔍 Checking existing state file..."
            if ! jq empty .beaver/incremental-state.json >/dev/null 2>&1; then
              echo "⚠️ Corrupted state file detected, removing..."
              rm -f .beaver/incremental-state.json
            fi
          fi

          # Create clean state directory
          mkdir -p .beaver

          # Step 1: Generate Astro data using Go backend
          echo "📊 Step 1: Generating Astro data with Go backend..."
          set +e
          ./bin/beaver build --astro-export --force-rebuild 
          build_exit_code=$?
          set -e
          
          if [ $build_exit_code -ne 0 ]; then
            echo "⚠️ Go backend data generation failed, attempting recovery..."
            
            # Clean slate approach if build fails
            rm -rf _site .beaver/incremental-state.json
            mkdir -p _site .beaver frontend/astro/src/data
            
            # Create minimal data file for Astro
            echo '{"issues":[],"statistics":{"total_issues":0,"open_issues":0,"closed_issues":0,"health_score":0},"navigation":{"toc":[]},"metadata":{"generated_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","repository":"'${{ needs.preflight.outputs.repository }}'","version":"1.0.0"}}' > frontend/astro/src/data/beaver.json
            echo "🔄 Created fallback data for Astro"
          else
            echo "✅ Go backend data generation successful"
            echo "📊 Astro data exported to frontend/astro/src/data/beaver.json"
          fi

          # Step 2: Setup Node.js for Astro build
          echo "📦 Step 2: Setting up Node.js for Astro..."

      - name: 📦 Setup Node.js for Astro
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/astro/package-lock.json

      - name: 🎨 Build Astro Frontend
        run: |
          echo "🎨 Step 3: Building Astro frontend..."
          
          # Install Astro dependencies
          cd frontend/astro
          npm ci
          
          # Build Astro site
          npm run build
          cd ../..
          
          # Verify Astro build output
          if [ -d "frontend/astro/dist" ]; then
            echo "✅ Astro build successful"
            echo "📁 Astro generated content in frontend/astro/dist/"
            ls -la frontend/astro/dist/
            
            # Prepare output directory for GitHub Pages
            rm -rf _site
            cp -r frontend/astro/dist _site
            echo "🔧 Copied frontend/astro/dist to _site for GitHub Pages deployment"
            
            # Integrate coverage dashboard into site
            if [ -f "coverage-dashboard.html" ] && [ -f "coverage-data.json" ]; then
              echo "📊 Integrating coverage dashboard into GitHub Pages..."
              
              # Create coverage subdirectory in site
              mkdir -p _site/coverage
              
              # Copy coverage files to site
              cp coverage-dashboard.html _site/coverage/index.html
              cp coverage-data.json _site/coverage/coverage-data.json
              
              # Copy additional coverage files if they exist
              [ -f "coverage-summary.json" ] && cp coverage-summary.json _site/coverage/
              [ -f "coverage.out" ] && cp coverage.out _site/coverage/
              
              echo "✅ Coverage dashboard integrated at /coverage/"
              echo "🌐 Dashboard will be available at: https://${{ github.repository_owner }}.github.io/beaver/coverage/"
            else
              echo "⚠️ Coverage dashboard files not found, skipping coverage integration"
            fi
          else
            echo "❌ No frontend/astro/dist directory found - Astro build may have failed"
            exit 1
          fi
            
          echo "✅ Astro frontend build completed successfully"

      - name: 📊 GitHub Pages Deployment Report
        if: always()
        run: |
          echo "📊 GitHub Pages Deployment Report"
          echo "================================="
          echo "🚀 Target: GitHub Pages (Astro Frontend)"
          echo "🎯 Trigger: ${{ github.event_name }}"
          echo "🔄 Update Type: ${{ needs.preflight.outputs.update_type }}"
          echo "📁 Repository: ${{ needs.preflight.outputs.repository }}"
          echo "⏰ Completed: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "✅ Status: ${{ job.status }}"
          echo "🌐 Pages URL: https://${{ github.repository_owner }}.github.io/beaver"
          echo "🎨 Architecture: Go Backend + Astro Frontend"

          # Show incremental state if exists and is valid
          if [ -f ".beaver/incremental-state.json" ]; then
            echo ""
            echo "📈 Incremental State:"
            if jq empty .beaver/incremental-state.json >/dev/null 2>&1; then
              jq -r '.last_update // "Never"' .beaver/incremental-state.json | sed 's/^/  Last Update: /' || echo "  Last Update: Parse Error"
              jq -r '.processed_issues | length' .beaver/incremental-state.json | sed 's/^/  Processed Issues: /' || echo "  Processed Issues: Parse Error"
              jq -r '.processed_events | length' .beaver/incremental-state.json | sed 's/^/  Processed Events: /' || echo "  Processed Events: Parse Error"
            else
              echo "  ⚠️ State file exists but is corrupted"
            fi
          else
            echo ""
            echo "📈 Incremental State: No state file found"
          fi

          # Show log file if exists
          if [ -f ".beaver/ci-beaver.log" ]; then
            echo ""
            echo "📝 Recent Log Entries:"
            tail -n 10 .beaver/ci-beaver.log | sed 's/^/  /' || echo "  ログファイル読み取りエラー"
          fi
          
          # Check generated site structure
          echo ""
          echo "📁 Generated Site Structure:"
          if [ -d "_site" ]; then
            ls -la _site || echo "❌ Site directory listing failed"
          else
            echo "❌ No _site directory found - check if generation was successful"
          fi
          
          # Basic site validation
          echo ""
          echo "📄 Site Validation:"
          if [ -d "_site" ]; then
            echo "✅ Site directory exists"
            file_count=$(find _site -type f | wc -l)
            echo "📁 Generated $file_count files"
          else
            echo "❌ _site directory not found"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: |
          echo "📦 Preparing site for deployment"
          # Copy generated site to output directory
          mkdir -p ./output
          cp -r ./_site/* ./output/
          
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./output"

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📤 Upload automation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beaver-automation-${{ github.run_id }}-${{ github.job }}
          path: |
            .beaver/
            *.md
            !README.md
            coverage-*.html
            coverage-*.json
            coverage.out
          retention-days: 7
          if-no-files-found: warn


  # Self-documentation cleanup and maintenance
  self-documentation-cleanup:
    name: 🧹 Self-Documentation Cleanup
    runs-on: ubuntu-latest
    needs: [beaver-self-documentation]
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.force_rebuild == 'true')  }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Build tools
        run: |
          go mod download
          make build
          chmod +x ./scripts/core/ci-beaver.sh

      - name: 🧹 Perform self-documentation cleanup
        run: |
          echo "🧹 Performing self-documentation maintenance cleanup..."
          echo "🦫 Meta-maintenance: Beaver cleaning up its own documentation artifacts"

          # Clean up old artifacts
          ./scripts/core/ci-beaver.sh clean || echo "Clean script not available, skipping cleanup"

          # Optimize incremental state for self-documentation
          if [ -f ".beaver/incremental-state.json" ]; then
            echo "📊 Self-documentation state size before cleanup:"
            du -h .beaver/incremental-state.json
            
            # The cleanup is handled by the incremental manager
            ./bin/beaver build --incremental --max-items 1 >/dev/null 2>&1 || true
            
            echo "📊 Self-documentation state size after cleanup:"
            du -h .beaver/incremental-state.json 2>/dev/null || echo "State file removed"
          fi

          echo "✅ Self-documentation cleanup complete - Beaver maintained its own knowledge base"

  # Weekly comprehensive self-analysis (separate from regular triggers)
  weekly-self-analysis:
    name: 📈 Weekly Self-Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/test/')) }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Build tools
        run: |
          go mod download
          make build
          chmod +x ./bin/beaver ./scripts/core/ci-beaver.sh

      - name: 📊 Execute comprehensive self-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "📈 === Weekly Beaver Self-Analysis ==="
          echo "🦫 Meta-Analysis: Comprehensive review of Beaver's own development patterns"
          echo "📅 Analysis Period: Past 7 days"
          echo "🎯 Focus: Development trends, health metrics, strategic insights"

          # Run comprehensive analysis with available flags
          ./bin/beaver build --force-rebuild --max-items 200

          echo "📊 Generating weekly development insights..."
          echo "Note: Advanced wiki generation features not yet implemented"

          echo "🏷️ Analyzing label effectiveness trends..."
          echo "Note: Label analysis features not yet implemented"

          echo "📈 Computing velocity and health trends..."
          echo "Note: Statistics generation features not yet implemented"

          echo "✅ Weekly self-analysis complete - Comprehensive insights generated"

      - name: 📤 Upload weekly analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-self-analysis-${{ github.run_id }}-${{ github.job }}
          path: |
            .beaver/
            *.md
            !README.md
          retention-days: 30
          if-no-files-found: warn
