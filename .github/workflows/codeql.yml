name: 🔒 CodeQL セキュリティ分析

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # 毎週火曜日の午前2時(JST)に実行
    - cron: '0 17 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: 🔍 CodeQL分析
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]

    steps:
    - name: 📥 コードのチェックアウト
      uses: actions/checkout@v4

    - name: 🐹 Go環境のセットアップ
      if: matrix.language == 'go'
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'
        cache: true

    - name: 🔧 CodeQLの初期化
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        config: |
          name: "Beaver CodeQL Config"
          disable-default-queries: false
          queries:
            - name: security-and-quality
              uses: security-and-quality
            - name: security-extended
              uses: security-extended
          paths-ignore:
            - "**/*_test.go"
            - "**/testdata/**"
            - "**/vendor/**"

    - name: 📦 依存関係のインストール
      if: matrix.language == 'go'
      run: |
        go mod download
        go mod tidy

    - name: 🔨 プロジェクトのビルド
      if: matrix.language == 'go'
      run: |
        make build

    - name: 🔍 CodeQL分析の実行
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{matrix.language}}"
        
    - name: 📊 分析結果のサマリー
      run: |
        echo "🔍 CodeQL セキュリティ分析が完了しました"
        echo "📋 分析対象言語: ${{ matrix.language }}"
        echo "🔗 結果は Security タブで確認できます"