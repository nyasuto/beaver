name: 🚀 リリース

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン (例: v1.0.0)'
        required: true
        type: string
      draft:
        description: 'ドラフトリリースとして作成'
        type: boolean
        default: false
      prerelease:
        description: 'プレリリースとしてマーク'
        type: boolean
        default: false

env:
  GO_VERSION: 'stable'

jobs:
  # リリースプロセス（ビルド + リリース作成）
  release:
    name: 🚀 リリース作成
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 📥 コードのチェックアウト
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐹 Go環境のセットアップ
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: 🚀 完全リリースプロセス実行
      run: ./scripts/release-builder.sh all
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ github.ref_name || inputs.version }}
        DRAFT: ${{ inputs.draft || 'false' }}
        PRERELEASE: ${{ inputs.prerelease || 'false' }}
        VERBOSE: true
        
    - name: 📤 成果物のアップロード（バックアップ）
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts
        path: release-files/
        retention-days: 30