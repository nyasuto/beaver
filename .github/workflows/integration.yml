name: 🔗 Integration Tests

# Integration tests can be triggered:
# 1. Manually via GitHub Actions UI (workflow_dispatch)
# 2. Automatically on PRs when integration-related files change
# 3. Automatically on main branch pushes
# 4. Weekly scheduled runs

on:
  # Manual trigger with options - allows testing in any branch/PR
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - quick
      repository:
        description: 'Override test repository'
        required: false
        default: ''
        type: string

  # Manual trigger on pull requests
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'scripts/testing/run-integration-tests.sh'
      - 'tests/integration/**'
      - '.github/workflows/integration.yml'
      - 'pkg/**'

  # Auto-trigger on main branch
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'

  # Weekly comprehensive run
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9 AM UTC

env:
  GO_VERSION: "stable"

jobs:
  # Quick integration tests
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && 
       (github.event.inputs.test_scope == 'all' || github.event.inputs.test_scope == 'quick'))

    environment: integration-testing

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦫 Setup Beaver Environment
        uses: ./.github/actions/build-and-test
        with:
          go-version: ${{ env.GO_VERSION }}
          skip-tests: true

      - name: ⚙️ Setup integration environment
        run: |
          chmod +x ./scripts/testing/run-integration-tests.sh

      - name: 🔗 Run integration tests
        env:
          BEAVER_INTEGRATION_TESTS: true
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
          BEAVER_TEST_REPO_OWNER: ${{ vars.BEAVER_TEST_REPO_OWNER }}
          BEAVER_TEST_REPO_NAME: ${{ vars.BEAVER_TEST_REPO_NAME }}
          BEAVER_DEBUG: true
          TARGET_REPOSITORY: ${{ github.event.inputs.repository || format('{0}/{1}', github.repository_owner, github.event.repository.name) }}
        run: |
          echo "🧪 Running integration tests..."
          echo "🎯 Target repository: $TARGET_REPOSITORY"
          echo "🔍 Test scope: ${{ github.event.inputs.test_scope || 'quick' }}"
          
          # Pre-flight checks
          ./scripts/testing/run-integration-tests.sh --check
          
          # Run tests based on scope
          case "${{ github.event.inputs.test_scope || 'quick' }}" in
            "quick"|"")
              ./scripts/testing/run-integration-tests.sh --quick --run
              ;;
            "all")
              ./scripts/testing/run-integration-tests.sh --all --run
              ;;
          esac
        timeout-minutes: 15

      - name: 📤 Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ github.run_id }}-${{ github.job }}
          path: |
            *.log
            .env.integration
            tests/integration/python/*.html
          retention-days: 7
          if-no-files-found: warn

  # Go performance tests
  performance-tests:
    name: 🚀 Performance Tests
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && 
       github.event.inputs.test_scope == 'all')

    environment: integration-testing

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 📦 Build Beaver binary
        run: |
          echo "🔨 Building Beaver for performance tests"
          go mod download
          go build -o ./bin/beaver ./cmd/beaver
          chmod +x ./bin/beaver

      - name: 🧪 Run Performance Tests
        env:
          GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
          BEAVER_TEST_REPO_OWNER: ${{ vars.BEAVER_TEST_REPO_OWNER }}
          BEAVER_TEST_REPO_NAME: ${{ vars.BEAVER_TEST_REPO_NAME }}
        run: |
          echo "🧪 Running Go performance tests"
          echo "🎯 Repository: $BEAVER_TEST_REPO_OWNER/$BEAVER_TEST_REPO_NAME"
          
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️ No GitHub token available - skipping performance tests"
            exit 0
          fi
          
          # Run tests with timing
          echo "⏱️ Running pkg/content performance tests"
          go test -v -timeout=30s ./pkg/content/... -run TestContent
          
          echo "⏱️ Running classification performance tests"
          go test -v -timeout=30s ./pkg/classification/... -run TestClassification

      - name: 📤 Upload Performance Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results-${{ github.run_id }}-${{ github.job }}
          path: |
            *.log
            test-results.json
          retention-days: 7
          if-no-files-found: warn

  # Integration test summary
  integration-complete:
    name: ✅ Integration Tests Complete
    runs-on: ubuntu-latest
    needs: [integration-tests, performance-tests]
    if: always()

    steps:
      - name: 📊 Report Integration Test Results
        run: |
          echo "📊 Integration Test Pipeline Results:"
          echo "🔗 Integration Tests: ${{ needs.integration-tests.result }}"
          echo "🚀 Performance Tests: ${{ needs.performance-tests.result }}"
          
          # Check for any failures
          if [[ "${{ needs.integration-tests.result }}" == "failure" || 
                "${{ needs.performance-tests.result }}" == "failure" ]]; then
            echo "❌ Some integration tests failed!"
            echo "ℹ️ Check individual job logs for details"
          else
            echo "✅ All integration tests completed successfully!"
          fi

      - name: 📝 Integration Test Summary
        if: always()
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.performance-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scope:** ${{ github.event.inputs.test_scope || 'auto' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.event.inputs.repository || github.repository }}" >> $GITHUB_STEP_SUMMARY