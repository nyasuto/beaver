name: 📖 Wiki Auto-Update

# Required permissions for GitHub Actions
permissions:
  contents: read        # Read repository contents
  issues: write        # Create issues on failure
  actions: read        # Read workflow information

on:
  # Issues closed - triggers wiki update
  issues:
    types: [closed]
  
  # Push to main branch - update wiki with latest
  push:
    branches: [main]
  
  # Weekly scheduled updates - sync any missed updates
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  
  # Manual trigger for on-demand updates
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full wiki rebuild'
        required: false
        default: false
        type: boolean
      target_repository:
        description: 'Override target repository (default: self)'
        required: false
        default: ''
        type: string

env:
  GO_VERSION: 'stable'
  BEAVER_CONFIG_FILE: 'beaver.yml'

jobs:
  # Security and validation checks
  pre-checks:
    name: 🔍 Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check_conditions.outputs.should_update }}
      wiki_exists: ${{ steps.check_wiki.outputs.wiki_exists }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for wiki updates
        
    - name: 🔍 Check update conditions
      id: check_conditions
      run: |
        should_update=true
        
        # Skip if this is triggered by the wiki update itself (prevent loops)
        if [[ "${{ github.event.head_commit.message }}" == *"[skip-wiki]"* ]]; then
          echo "Skipping wiki update - commit message contains [skip-wiki]"
          should_update=false
        fi
        
        # For issue events, only update if issue was actually closed (not reopened)
        if [[ "${{ github.event_name }}" == "issues" && "${{ github.event.action }}" == "closed" ]]; then
          echo "Issue #${{ github.event.issue.number }} closed - wiki update triggered"
        fi
        
        echo "should_update=$should_update" >> $GITHUB_OUTPUT
        
    - name: 🔍 Check if wiki exists
      id: check_wiki
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
      run: |
        # Check if wiki is enabled for this repository
        wiki_url="https://api.github.com/repos/${{ github.repository }}/pages"
        
        if curl -s -H "Authorization: token $GITHUB_TOKEN" "$wiki_url" | grep -q '"status": "built"'; then
          echo "wiki_exists=true" >> $GITHUB_OUTPUT
        else
          echo "wiki_exists=false" >> $GITHUB_OUTPUT
          echo "⚠️ Wiki not yet initialized for this repository"
        fi

  # Main wiki update job
  update-wiki:
    name: 📖 Update Wiki
    runs-on: ubuntu-latest
    needs: pre-checks
    if: needs.pre-checks.outputs.should_update == 'true'
    
    # Use environment for sensitive operations (configure 'wiki-automation' environment in repository settings)
    # environment: wiki-automation
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐹 Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: 📦 Install dependencies
      run: |
        go mod download
        go mod tidy
        
    - name: 🔨 Build Beaver
      run: |
        make build
        chmod +x ./bin/beaver
        
    - name: ✅ Verify build
      run: |
        # Verify beaver binary is executable and shows help
        ./bin/beaver --help
        
        # Verify beaver can show available commands
        ./bin/beaver help
        
    - name: ⚙️ Setup Beaver configuration
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
        TARGET_REPO: ${{ github.event.inputs.target_repository || github.repository }}
      run: |
        # Create beaver.yml if it doesn't exist
        if [ ! -f "$BEAVER_CONFIG_FILE" ]; then
          echo "📝 Creating Beaver configuration..."
          ./bin/beaver init
        fi
        
        # Update configuration for current repository
        cat > "$BEAVER_CONFIG_FILE" << EOF
        # Beaver Configuration - Auto-generated by GitHub Actions
        project:
          name: "$(echo $TARGET_REPO | cut -d'/' -f2)"
          description: "AI agent knowledge dam construction tool"
          version: "$(git describe --tags --always)"
        
        source:
          github:
            repository: "$TARGET_REPO"
            token_env: "GITHUB_TOKEN"
            include_closed_issues: true
            include_pull_requests: true
            max_issues: 100
            
        output:
          github_wiki:
            repository: "$TARGET_REPO"
            auto_commit: true
            commit_message: "docs: automated wiki update [skip-wiki]"
            branch: "main"
            
        processing:
          ai_enhancement: false  # Disable AI for automated updates
          template_engine: "default"
          
        logging:
          level: "info"
          format: "text"
        EOF
        
        echo "✅ Configuration created successfully"
        cat "$BEAVER_CONFIG_FILE"
        
    - name: 🔍 Analyze repository issues
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
      run: |
        echo "📊 Analyzing repository issues for wiki content..."
        
        # Get recent issues for wiki update
        ./bin/beaver fetch issues ${{ github.repository }} \
          --state=all \
          --sort=updated \
          --per-page=50 \
          --output=issues.json
        
        issue_count=$(jq '.fetched_count' issues.json)
        echo "📋 Found $issue_count issues to process"
        
        if [ "$issue_count" -eq 0 ]; then
          echo "⚠️ No issues found - creating minimal wiki"
        fi
        
    - name: 📖 Generate wiki content
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
        FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
      run: |
        echo "📝 Generating wiki content..."
        
        # Create wiki content based on issues
        if [ "$FORCE_REBUILD" = "true" ]; then
          echo "🔄 Force rebuild requested - regenerating all wiki content"
          ./bin/beaver build --force --verbose
        else
          echo "⚡ Incremental update - processing recent changes"
          ./bin/beaver build --verbose
        fi
        
    - name: 📤 Clone wiki repository
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
      run: |
        echo "📁 Cloning wiki repository..."
        
        # Clone the wiki repository
        wiki_url="https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.wiki.git"
        
        if git clone "$wiki_url" wiki-repo 2>/dev/null; then
          echo "✅ Wiki repository cloned successfully"
          cd wiki-repo
          ls -la
        else
          echo "⚠️ Wiki not initialized - creating initial wiki structure"
          # Initialize wiki by creating the Home page
          mkdir -p wiki-repo
          cd wiki-repo
          git init
          git remote add origin "$wiki_url"
          
          # Create initial Home page
          cat > Home.md << 'EOF'
        # Welcome to the Beaver Project Wiki
        
        This wiki is automatically updated by our CI/CD pipeline.
        
        ## About Beaver
        
        Beaver is an AI agent knowledge dam construction tool that transforms AI development workflows into structured, persistent knowledge.
        
        ## Wiki Contents
        
        This wiki is automatically generated from:
        - GitHub Issues and their discussions
        - Project documentation
        - Development insights and patterns
        
        ## Last Updated
        
        This wiki was last updated automatically on $(date -u '+%Y-%m-%d %H:%M:%S UTC').
        
        ---
        *This wiki is maintained automatically. For manual updates, please create issues or update the source documentation.*
        EOF
          
          git add .
          git -c user.name="GitHub Actions" -c user.email="actions@github.com" commit -m "docs: initialize wiki [skip-wiki]"
          
          # Try to push - this will create the wiki if it doesn't exist
          if git push -u origin master 2>/dev/null || git push -u origin main 2>/dev/null; then
            echo "✅ Wiki initialized successfully"
          else
            echo "❌ Failed to initialize wiki - may need manual setup"
            exit 1
          fi
        fi
        
    - name: 📝 Update wiki pages
      working-directory: wiki-repo
      env:
        GITHUB_TOKEN: ${{ secrets.BEAVER_GITHUB_TOKEN }}
      run: |
        echo "📝 Updating wiki pages..."
        
        # Copy generated wiki content (if Beaver generated any)
        if [ -d "../wiki-output" ]; then
          echo "📋 Copying generated wiki content..."
          cp -r ../wiki-output/* .
        fi
        
        # Update the Home page with current project status
        cat > Home.md << EOF
        # ${{ github.repository }} Wiki
        
        **Last Updated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')  
        **Update Trigger:** ${{ github.event_name }}
        
        ## Project Overview
        
        This wiki is automatically maintained and contains:
        
        ### 📋 Issues & Documentation
        - Automatically extracted from GitHub Issues
        - Project discussions and decisions
        - Development insights and patterns
        
        ### 🔄 Update Information
        
        | Trigger | Description |
        |---------|-------------|
        | Issues Closed | Wiki updated when issues are resolved |
        | Main Branch Push | Content refreshed on code changes |
        | Weekly Schedule | Automatic sync every Sunday |
        | Manual Trigger | On-demand updates available |
        
        ### 🏷️ Recent Activity
        
        **Trigger:** \`${{ github.event_name }}\`
        
        $( if [ "${{ github.event_name }}" = "issues" ]; then
          echo "**Issue #${{ github.event.issue.number }}** - ${{ github.event.issue.title }}"
          echo ""
          echo "${{ github.event.issue.body }}" | head -n 5
        elif [ "${{ github.event_name }}" = "push" ]; then
          echo "**Latest Commit:** \`${{ github.sha }}\`"
          echo "**Message:** ${{ github.event.head_commit.message }}"
        elif [ "${{ github.event_name }}" = "schedule" ]; then
          echo "**Scheduled Update:** Weekly maintenance sync"
        elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "**Manual Update** triggered by: @${{ github.actor }}"
        fi )
        
        ---
        
        ## Navigation
        
        📖 **[All Pages](./)**  
        🔍 **[Search Issues](https://github.com/${{ github.repository }}/issues)**  
        🚀 **[Project Repository](https://github.com/${{ github.repository }})**
        
        ---
        *🤖 This wiki is automatically maintained by GitHub Actions*
        EOF
        
        # Create Issues summary page if we have issue data
        if [ -f "../issues.json" ]; then
          echo "📊 Creating Issues summary page..."
          
          cat > Issues-Summary.md << 'EOF'
        # Issues Summary
        
        This page provides an overview of project issues automatically extracted and summarized.
        
        ## Statistics
        
        **Last Updated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        EOF
          
          # Add issue statistics using jq if available
          if command -v jq >/dev/null; then
            echo "📈 Adding issue statistics..."
            issue_count=$(jq '.fetched_count' ../issues.json)
            echo "**Total Issues Processed:** $issue_count" >> Issues-Summary.md
            echo "" >> Issues-Summary.md
          fi
        fi
        
    - name: 📤 Commit and push wiki changes
      working-directory: wiki-repo
      run: |
        echo "💾 Committing wiki changes..."
        
        # Configure git
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Add all changes
        git add .
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit to wiki"
        else
          # Commit changes
          commit_msg="docs: automated wiki update from ${{ github.event_name }}"
          
          if [ "${{ github.event_name }}" = "issues" ]; then
            commit_msg="docs: wiki update after issue #${{ github.event.issue.number }} closed [skip-wiki]"
          elif [ "${{ github.event_name }}" = "push" ]; then
            commit_msg="docs: wiki update after push to main [skip-wiki]"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            commit_msg="docs: scheduled wiki maintenance update [skip-wiki]"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            commit_msg="docs: manual wiki update by @${{ github.actor }} [skip-wiki]"
          fi
          
          git commit -m "$commit_msg"
          
          # Push changes
          if git push; then
            echo "✅ Wiki updated successfully"
          else
            echo "❌ Failed to push wiki changes"
            exit 1
          fi
        fi
        
    - name: 📊 Report results
      if: always()
      run: |
        echo "📊 Wiki Update Summary:"
        echo "🎯 Trigger: ${{ github.event_name }}"
        echo "⏰ Completed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "🔗 Repository: ${{ github.repository }}"
        
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ Wiki update completed successfully"
          echo "🔗 View wiki: https://github.com/${{ github.repository }}/wiki"
        else
          echo "❌ Wiki update failed"
        fi

  # Notification job for failures
  notify-failure:
    name: 📧 Notify on Failure
    runs-on: ubuntu-latest
    needs: [pre-checks, update-wiki]
    if: failure() && (needs.pre-checks.result == 'failure' || needs.update-wiki.result == 'failure')
    
    steps:
    - name: 🚨 Create failure issue
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.BEAVER_GITHUB_TOKEN }}
        script: |
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 Wiki Auto-Update Failed - ${new Date().toISOString().split('T')[0]}`,
            body: `## Wiki Update Failure Report
            
            **Workflow:** Wiki Auto-Update
            **Trigger:** \`${{ github.event_name }}\`
            **Run ID:** [\`${{ github.run_id }}\`](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Failure Time:** ${new Date().toUTCString()}
            
            ### Failure Details
            
            - **Pre-checks Status:** \`${{ needs.pre-checks.result }}\`
            - **Wiki Update Status:** \`${{ needs.update-wiki.result }}\`
            
            ### Investigation Steps
            
            1. 🔍 Review the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. 🔑 Check if GitHub token has sufficient permissions
            3. 📖 Verify wiki repository accessibility
            4. ⚙️ Validate Beaver configuration
            
            ### Quick Fixes
            
            - If this is a permission issue, ensure the token has \`wiki\` scope
            - If the wiki doesn't exist, create it manually first
            - Check if the repository settings allow wiki access
            
            ---
            
            *🤖 This issue was created automatically by the failed wiki update workflow*
            `,
            labels: ['type: ci/cd', 'priority: high', 'automation']
          });
          
          console.log(`Created issue #${issue.data.number} for wiki update failure`);