name: ✨ 機能要求
description: 新しい機能の提案
title: "feat: [機能の簡潔な説明]"
labels: ["type: feature", "priority: medium"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 機能要求
        Beaverに追加したい新しい機能について提案してください。

  - type: textarea
    id: problem
    attributes:
      label: "🎯 解決したい問題"
      description: "この機能によってどのような問題を解決したいですか？"
      placeholder: "現在の問題点や課題について説明..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "💡 提案する解決策"
      description: "どのような機能や改善を提案しますか？"
      placeholder: "具体的な機能の説明..."
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: "🔧 実装の詳細"
      description: "技術的な実装方法のアイデアがあれば記載してください"
      placeholder: "実装のアプローチ、技術的な詳細など..."

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 受け入れ条件"
      description: "この機能が完成したと判断するための条件を列挙してください"
      placeholder: |
        - [ ] 条件1
        - [ ] 条件2
        - [ ] 条件3
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 代替案"
      description: "他に考えられる解決方法はありますか？"

  - type: dropdown
    id: component
    attributes:
      label: "📂 関連コンポーネント"
      options:
        - "CLI (コマンドライン)"
        - "GitHub API (データ取得)"
        - "AI処理 (Python サービス)"
        - "Wiki出力 (ドキュメント生成)"
        - "設定管理 (Configuration)"
        - "その他"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🚨 優先度"
      options:
        - priority: low
        - priority: medium
        - priority: high
        - priority: critical
      default: 1
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "📎 追加情報"
      description: "その他の関連情報があれば記載してください"