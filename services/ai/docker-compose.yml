# Beaver AI Services - Docker Compose Configuration

version: '3.8'

services:
  beaver-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # Use development stage for local development
    container_name: beaver-ai-services
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      # AI API keys (set these in .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
    volumes:
      # Mount source code for development
      - ./app:/app/app
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production service configuration
  beaver-ai-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: beaver-ai-prod
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=WARNING
    env_file:
      - .env
    restart: unless-stopped
    profiles:
      - production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: beaver-network

volumes:
  logs:
    driver: local